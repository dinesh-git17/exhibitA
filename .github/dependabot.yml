# Dependabot -- Exhibit A
# Reference: CLAUDE.md S8 (Dependency Approval Policy)
#
# Active ecosystems:
#   github-actions -- 11 CI/CD workflows, 4 versioned action pins
#
# Active ecosystems:
#   pip -- FastAPI backend (requirements.txt committed)
#
# Not supported by Dependabot:
#   swift -- SPM dependencies must be updated manually or via Xcode

version: 2

updates:
  # -----------------------------------------------------------------
  # GitHub Actions
  # Scope: .github/workflows/*.yml (11 files)
  # Pins: actions/checkout@v4, actions/setup-python@v5,
  #        actions/cache@v4, actions/upload-artifact@v4
  # -----------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      ci-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    reviewers:
      - "dinesh-git17"

  # -----------------------------------------------------------------
  # Python (pip)
  # Scope: requirements.txt
  # Runtime: fastapi, uvicorn, pydantic, aioapns, jinja2,
  #   bcrypt, structlog, python-multipart
  # Dev: ruff, mypy, pytest, pytest-asyncio, httpx
  # -----------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    reviewers:
      - "dinesh-git17"
