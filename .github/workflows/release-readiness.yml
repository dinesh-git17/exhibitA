# release-readiness.yml -- Pre-release validation gate for TestFlight deployment
#
# Surfaces: All (full repository validation before release)
# Purpose: Comprehensive pre-release checklist that validates every governance
#          rule, quality gate, and contract before a TestFlight build. Runs on
#          manual dispatch and on release branches. This is the final gate --
#          if this workflow fails, the build is not ready for TestFlight.
# Reference: Design doc S10.2 (TestFlight), CLAUDE.md S12 (Definition of Done)
#
# TestFlight note: Builds expire every 90 days. Xcode Cloud handles the actual
# build and deployment (design doc S10.9). This workflow validates readiness.

name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        default: "testflight"
        type: choice
        options:
          - testflight
          - staging
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: false

jobs:
  governance:
    name: Governance compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Protocol Zero scan
        run: |
          if [ -f "scripts/protocol-zero.sh" ]; then
            chmod +x scripts/protocol-zero.sh
            ./scripts/protocol-zero.sh
          else
            echo "::error::scripts/protocol-zero.sh is required for release -- file not found"
            exit 1
          fi

      - name: Typographic lint
        run: |
          if [ -f "scripts/check-em-dashes.sh" ]; then
            chmod +x scripts/check-em-dashes.sh
            ./scripts/check-em-dashes.sh
          else
            echo "::error::scripts/check-em-dashes.sh is required for release -- file not found"
            exit 1
          fi

      - name: Validate no secrets in source
        run: |
          set -euo pipefail
          ERRORS=0

          # Scan for hardcoded secrets patterns
          PATTERNS=(
            'AAAA[A-Za-z0-9_-]{60,}'     # APNS auth key pattern
            'sk-[a-zA-Z0-9]{32,}'         # Generic secret key pattern
            'password\s*=\s*["\x27][^"\x27]+'  # Hardcoded passwords
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include='*.py' --include='*.swift' --include='*.html' \
              -E "$pattern" . \
              --exclude-dir=.git --exclude-dir=.venv --exclude-dir=.claude \
              --exclude-dir=DerivedData --exclude-dir=__pycache__ \
              2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Potential hardcoded secret detected:"
              echo "$MATCHES" | head -5
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Verify .env is gitignored
          if [ -f ".env" ]; then
            if git check-ignore .env > /dev/null 2>&1; then
              echo "  OK: .env is gitignored"
            else
              echo "::error::.env file exists and is NOT gitignored -- security violation"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS security finding(s) must be resolved before release"
            exit 1
          fi
          echo "No hardcoded secrets detected"

  backend-quality:
    name: Backend quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect backend
        id: detect
        run: |
          if [ -d "app" ] && [ -n "$(find app -name '*.py' -print -quit 2>/dev/null)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.detect.outputs.exists == 'true'
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        if: steps.detect.outputs.exists == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Ruff format check
        if: steps.detect.outputs.exists == 'true'
        run: ruff format --check app/

      - name: Ruff lint
        if: steps.detect.outputs.exists == 'true'
        run: ruff check app/

      - name: Mypy strict
        if: steps.detect.outputs.exists == 'true'
        run: mypy --strict app/

      - name: Run tests
        if: steps.detect.outputs.exists == 'true'
        run: |
          if [ -d "tests" ] && [ -n "$(find tests -name 'test_*.py' -print -quit 2>/dev/null)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "::notice::No backend tests found"
          fi

      - name: Skip notice
        if: steps.detect.outputs.exists != 'true'
        run: echo "::notice::Backend surface not found -- skipping backend quality gate"

  ios-quality:
    name: iOS quality gate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Detect iOS project
        id: detect
        run: |
          if [ -d "ExhibitA" ] && [ -n "$(find ExhibitA -name '*.xcodeproj' -o -name 'Package.swift' -print -quit 2>/dev/null)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        if: steps.detect.outputs.exists == 'true'
        run: |
          XCODE_PATH=$(find /Applications -maxdepth 1 -name 'Xcode_17*' -print -quit 2>/dev/null || true)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(find /Applications -maxdepth 1 -name 'Xcode*.app' | sort -V | tail -1)
            echo "::warning::Xcode 17.x not found, using: $XCODE_PATH"
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Cache SPM
        if: steps.detect.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-${{ runner.arch }}-spm-release-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-spm-release-
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: SwiftLint
        if: steps.detect.outputs.exists == 'true'
        run: |
          if [ -f ".swiftlint.yml" ]; then
            brew install swiftlint
            swiftlint lint --strict --reporter github-actions-logging ExhibitA/
          else
            echo "::notice::No .swiftlint.yml found -- skipping lint"
          fi

      - name: Build
        if: steps.detect.outputs.exists == 'true'
        run: |
          SCHEME=$(xcodebuild -list -json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('project',d.get('workspace',{})).get('schemes',['ExhibitA'])[0])" 2>/dev/null || echo "ExhibitA")
          xcodebuild build \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        if: steps.detect.outputs.exists == 'true'
        run: |
          SCHEME=$(xcodebuild -list -json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('project',d.get('workspace',{})).get('schemes',['ExhibitA'])[0])" 2>/dev/null || echo "ExhibitA")
          if [ -d "ExhibitATests" ] && [ -n "$(find ExhibitATests -name '*.swift' -print -quit 2>/dev/null)" ]; then
            xcodebuild test \
              -scheme "$SCHEME" \
              -destination 'platform=iOS Simulator,name=iPhone 16' \
              -skipPackagePluginValidation \
              -skipMacroValidation \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "::notice::No iOS tests found"
          fi

      - name: Skip notice
        if: steps.detect.outputs.exists != 'true'
        run: echo "::notice::iOS project not found -- skipping iOS quality gate"

  release-gate:
    name: Release gate
    if: always()
    needs: [governance, backend-quality, ios-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate release readiness
        run: |
          echo "=== Release Readiness Report ==="
          echo "Governance:     ${{ needs.governance.result }}"
          echo "Backend:        ${{ needs.backend-quality.result }}"
          echo "iOS:            ${{ needs.ios-quality.result }}"
          echo "================================"

          # Governance is always required
          if [ "${{ needs.governance.result }}" != "success" ]; then
            echo "::error::Governance checks failed -- release blocked"
            exit 1
          fi

          # Backend and iOS failures block release; skips are acceptable
          # (surface may not exist yet in early development)
          for job in "backend-quality" "ios-quality"; do
            RESULT="${{ needs[job].result }}"
            if [ "$RESULT" = "failure" ]; then
              echo "::error::$job failed -- release blocked"
              exit 1
            fi
          done

          echo ""
          echo "Release readiness: PASS"
          echo "All quality gates satisfied. Proceed with TestFlight deployment."
